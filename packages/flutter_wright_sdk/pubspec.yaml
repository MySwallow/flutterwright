name: flutter_wright_sdk
description: Debug-only in-app HTTP server for Flutter apps — powers Playwright-style automation via the flutter-wright skill.
version: 0.3.0
homepage: https://github.com/MySwallow/flutterwright
repository: https://github.com/MySwallow/flutterwright

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  vm_service: '>=14.0.0 <16.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
