name: flutter_wright_example
description: Demo Flutter app showcasing flutter_wright_sdk integration.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Automation SDK: debug-only, imported solely from dev/ + test/.
  # Production lib/ has zero reference to it, so release builds exclude it.
  flutter_wright_sdk:
    path: ../flutter_wright_sdk
  # Test-only: drives the GetX integration acceptance test
  # (test/getx_integration_test.dart). Not used by app code.
  get: ^4.6.6

flutter:
  uses-material-design: true
